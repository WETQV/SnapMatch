name: Build release packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.0.4
      upload_release:
        description: Upload built assets to the release
        required: true
        type: boolean
        default: true
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  linux-deb:
    name: Linux Debian package
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "RELEASE_TAG=${{ inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev ffmpeg libegl1 libxcb-cursor0 libxkbcommon-x11-0

      - name: Build Debian package
        run: |
          SNAPMATCH_VERSION="${RELEASE_TAG#v}" bash build_linux.sh

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: snapmatch-linux-deb
          path: dist/SnapMatch_*_amd64.deb

      - name: Upload release asset
        if: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || (github.event_name == 'workflow_dispatch' && inputs.upload_release) }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$RELEASE_TAG" dist/SnapMatch_*_amd64.deb --clobber
